services:
  - type: web
    name: open-table-backend
    env: node
    buildCommand: npm install && npx prisma generate
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: open-table-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: open-table-db
    plan: free
